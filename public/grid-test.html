<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Grid Layout</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              deepest: '#0A0A0A',
              deep: '#121212',
              elevated: '#1C1C1C',
              red: {
                primary: '#D12D30',
                bright: '#E13C3E',
              },
              text: {
                primary: '#FAFAFA',
                secondary: '#B8B8B8',
                muted: '#717171',
              }
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-brand-deep min-h-screen p-8">
  <h1 class="text-3xl text-brand-text-primary mb-6">Grid Test</h1>
  
  <!-- 5 Column Grid -->
  <div class="grid grid-cols-5 gap-4 mb-6">
    <div class="bg-brand-elevated p-4 text-brand-text-primary">Col 1</div>
    <div class="bg-brand-elevated p-4 text-brand-text-primary">Col 2</div>
    <div class="bg-brand-elevated p-4 text-brand-text-primary">Col 3</div>
    <div class="bg-brand-elevated p-4 text-brand-text-primary">Col 4</div>
    <div class="bg-brand-elevated p-4 text-brand-text-primary">Col 5</div>
  </div>
  
  <!-- 3 Column Grid -->
  <div class="grid grid-cols-3 gap-4">
    <div class="bg-brand-elevated p-4 text-brand-text-primary">Left (1/3)</div>
    <div class="bg-brand-elevated p-4 text-brand-text-primary">Middle (1/3)</div>
    <div class="bg-brand-elevated p-4 text-brand-text-primary">Right (1/3)</div>
  </div>
</body>
</html>
